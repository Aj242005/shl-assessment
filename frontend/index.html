<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Assessment Recommendation Agent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>SHL Agent</h1>
            </div>
            <div class="status">
                <span class="status-dot"></span>
                <span id="health-status">Checking backend...</span>
            </div>
        </header>
        
        <main id="chat-messages">
            <div class="message assistant">
                <div class="message-content">
                    <p>Hello! I'm the SHL Assessment Recommendation Agent. I can help you find the right assessments for your hiring needs.</p>
                    <p>Tell me a bit about the role you're hiring for (e.g. "I'm hiring a senior Java developer" or "We need to screen 500 call center agents").</p>
                </div>
            </div>
        </main>
        
        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off" required>
                <button type="submit" id="send-button">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
